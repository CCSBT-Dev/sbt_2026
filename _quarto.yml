project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - doc/NewLengthFreq.qmd

website:
  title: "SBT 2026"
  site-url: "https://ccsbt-dev.github.io/sbt_2026/"
  favicon: images/favicon.svg
  navbar:
    logo: images/ccsbt_logo.png
    left:
      - text: "Home"
        href: index.qmd
      - text: "Length Frequency"
        href: doc/NewLengthFreq.qmd
      - text: "Data Weighting"
        href: doc/Data_weighting.html
      - text: "OMMP16"
        href: OMMP16/OMMP16.html

format:
  html:
    theme: cosmo
    toc: true
    code-fold: true
    code-tools: true
    lightbox: true

resources:
  - OMMP16/OMMP16.html
  - OMMP16/OMMP16.pdf
  - OMMP16/OMMP16_files/**
  - doc/NewLengthFreq.pdf
  - doc/lf_gam_cpue_sbt_fishery_length_freq.csv
  - doc/Data_weighting.html
  - doc/Data_weighting.pdf
  - doc/data_weighting_workflow_infographic.svg
  - doc/data_weighting_workflow_infographic.png
  - doc/data_weighting_workflow_infographic.pdf
  - doc/osa_residual_framework_infographic.png
  - doc/Data_weighting_files/**
  - images/**
  - site.webmanifest
